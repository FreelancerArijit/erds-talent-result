<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Opening Result...</title>
  <script>
    const params = new URLSearchParams(window.location.search);
    const url = params.get("url");

    if (url) {
      window.location.replace(url);
    } else {
      document.body.innerHTML = "Invalid link";
    }
  </script>
</head>
<body>
  Opening result...
</body>
</html>
